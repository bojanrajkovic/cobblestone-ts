name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout the tagged commit
      id-token: write # OIDC token for npm/pnpm trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false # one-shot publish job; avoid cache poisoning on a tag-triggered run

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm fmt

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm vitest run

      - name: Publish
        run: pnpm publish --access public --no-git-checks --provenance
